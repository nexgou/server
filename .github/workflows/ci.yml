name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

  # ── Vet ──────────────────────────────────────────────────────────────────────
  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ── Test & Coverage ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with race detector
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic -coverpkg=./src/... ./test/...

      - name: Check coverage threshold (65%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep total \
            | awk '{print $3}' \
            | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          # Use awk for float comparison (bash can't compare floats)
          awk -v cov="$COVERAGE" 'BEGIN {
            if (cov + 0 < 65) {
              print "FAIL: coverage " cov "% is below the required 65%"
              exit 1
            } else {
              print "PASS: coverage " cov "% meets the 65% threshold"
            }
          }'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      # Optional: upload to Codecov if the repo is public
      # - name: Upload to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     files: coverage.out

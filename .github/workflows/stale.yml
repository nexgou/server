name: Stale issues and PRs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been inactive for 60 days and is marked as stale.
            It will be closed in 7 days if there is no further activity.
            If this is still relevant, please leave a comment or remove the `stale` label.
          close-issue-message: >
            This issue was closed due to inactivity. Feel free to reopen it if the problem persists.

          # Pull Requests
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >
            This pull request has been inactive for 30 days and is marked as stale.
            It will be closed in 7 days if there is no further activity.
            If this is still relevant, please rebase and leave a comment.
          close-pr-message: >
            This pull request was closed due to inactivity. Feel free to reopen it if you want to continue.

          # Never mark these as stale
          exempt-issue-labels: "pinned,security,blocked"
          exempt-pr-labels: "pinned,security,blocked"
